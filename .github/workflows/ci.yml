name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
      - "feature/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore BomberosAPI.slnx

      - name: Build solution
        run: dotnet build BomberosAPI.slnx --no-restore --configuration Release

      - name: Run tests (if any test project exists)
        run: |
          if find . -iname "*Tests.csproj" -o -iname "*.Test.csproj" -o -iname "*.Tests.csproj" | grep -q .; then
            dotnet test BomberosAPI.slnx --no-build --configuration Release --verbosity normal
          else
            echo "No test projects found, skipping dotnet test."
          fi
        shell: bash

      - name: Code style & analyzer report (non-blocking)
        if: always()
        continue-on-error: true
        run: |
          echo "## Code style & Roslyn analyzer report" >> "$GITHUB_STEP_SUMMARY"
          dotnet build BomberosAPI.slnx --no-restore --configuration Release > analyzer-report.txt 2>&1 || true
          WARN_COUNT=$(grep -c "warning " analyzer-report.txt || true)
          echo "Total warnings found: $WARN_COUNT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep "warning " analyzer-report.txt >> "$GITHUB_STEP_SUMMARY" || echo "No warnings." >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        shell: bash
